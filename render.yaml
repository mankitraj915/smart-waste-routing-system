services:
  - type: web
    name: waste-api
    env: python
    buildCommand: pip install -r backend/requirements.txt psycopg2-binary
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: waste-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: waste-redis
          property: connectionString

  - type: worker
    name: waste-worker
    env: python
    buildCommand: pip install -r backend/requirements.txt psycopg2-binary
    startCommand: cd backend && celery -A app.celery_worker.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: waste-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: waste-redis
          property: connectionString

  - type: web
    name: waste-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist

databases:
  - name: waste-db
    databaseName: waste_system
    user: admin

  - type: redis
    name: waste-redis
